<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova - Panel de Control</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carga del cliente oficial de Supabase desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>Sistema de Gestión Innova</h1>
    </header>

    <div class="container">
        <!-- Sección de Autenticación -->
        <section class="auth-section">
            <div class="card" id="register-card">
                <h2>Crear Cuenta</h2>
                <form id="register-form">
                    <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                    <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                    <input type="password" id="reg-password" placeholder="Contraseña" required>
                    <button type="submit">Registrarse</button>
                </form>
            </div>

            <div class="card" id="login-card">
                <h2>Iniciar Sesión</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Correo electrónico" required>
                    <input type="password" id="login-password" placeholder="Contraseña" required>
                    <button type="submit">Ingresar</button>
                </form>
            </div>
        </section>

        <!-- Sección de Datos (Inicialmente oculta o visible para pruebas) -->
        <section class="data-section">
            <h2>Panel de Datos de la Empresa</h2>
            
         <table id="tabla-inventario">
    <thead>
        <tr>
            <th>Equipo</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
        </tr>
    </thead>
    <tbody>
        <!-- El JS meterá los datos aquí -->
    </tbody>
</table>
                </div>

           <table id="tabla-pedidos">
    <thead>
        <tr>
            <th>Pedido</th>
            <th>Total</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        <!-- El JS meterá los datos aquí -->
    </tbody>
</table>
    
                </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
